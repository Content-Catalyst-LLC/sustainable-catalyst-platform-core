services:
  - type: web
    name: sustainable-catalyst-platform-core
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: ./start.sh
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.11
      - key: SC_CORE_ENVIRONMENT
        value: production
      - key: SC_CORE_PUBLIC_READS
        value: "true"
      - key: SC_CORE_DATABASE_URL
        fromDatabase:
          name: sustainable-catalyst-platform-core-db
          property: connectionString
      - key: SC_CORE_WRITE_API_KEY
        generateValue: true
      - key: SC_CORE_CORS_ORIGINS
        value: https://sustainablecatalyst.com
      - key: SC_CORE_MAX_GRAPH_DEPTH
        value: "4"
      - key: SC_CORE_EXPLORER_ENABLED
        value: "true"
      - key: SC_CORE_EVIDENCE_EXPLORER_ENABLED
        value: "true"
      - key: SC_CORE_SNAPSHOT_EXCERPT_MAX
        value: "1200"
      - key: SC_CORE_PUBLIC_API_ENABLED
        value: "true"
      - key: SC_CORE_DEVELOPER_PORTAL_ENABLED
        value: "true"
      - key: SC_CORE_PUBLIC_API_DEFAULT_PLAN
        value: free
      - key: SC_CORE_API_LOG_SALT
        generateValue: true
      - key: SC_CORE_WEBHOOK_SIGNING_SECRET
        generateValue: true
      - key: SC_CORE_WEBHOOK_DELIVERY_TIMEOUT
        value: "10"
      - key: SC_CORE_TRUST_CENTER_ENABLED
        value: "true"
      - key: SC_CORE_TRUST_PUBLIC_STATUS_ENABLED
        value: "true"
      - key: SC_CORE_TRUST_STALE_AFTER_DAYS
        value: "90"
      - key: SC_CORE_LIVE_DATA_ENABLED
        value: "true"
      - key: SC_CORE_LIVE_DATA_INGEST_ENABLED
        value: "true"
      - key: SC_CORE_LIVE_DATA_STRICT_FREE_SOURCES
        value: "true"
      - key: SC_CORE_LIVE_DATA_USER_AGENT
        value: SustainableCatalystPlatformCore/2.7.1 (+https://sustainablecatalyst.com/contact/)
      - key: SC_CORE_LIVE_DATA_TIMEOUT_SECONDS
        value: "20"
      - key: SC_CORE_LIVE_DATA_MAX_RESPONSE_BYTES
        value: "12582912"
      - key: SC_CORE_LIVE_DATA_RAW_PAYLOAD_MAX_BYTES
        value: "1048576"
      - key: SC_CORE_RELIEFWEB_APPNAME
        value: ""
      - key: SC_CORE_HDX_HAPI_APP_IDENTIFIER
        value: sustainable-catalyst-platform-core
      - key: SC_CORE_UHRI_API_URL
        value: ""
      - key: SC_CORE_UN_POPULATION_BEARER_TOKEN
        value: ""

databases:
  - name: sustainable-catalyst-platform-core-db
    databaseName: sustainable_catalyst_platform_core
    user: sustainable_catalyst_platform_core

# Platform Core v2.7.1
# Add these secret values in Render rather than committing them:
# SC_CORE_WORKFLOW_ENGINE_ENABLED=true
# SC_CORE_DOSSIER_CENTER_ENABLED=true
# SC_CORE_DOSSIER_SIGNING_SECRET=<long random secret>
# SC_CORE_DOSSIER_SIGNING_KEY_ID=sc-platform-core-production
# SC_CORE_DOSSIER_REQUIRED_APPROVALS=1
# SC_CORE_DOSSIER_MAX_RECORDS=500

# Optional free credential for the FRED reference connector:
# SC_CORE_FRED_API_KEY=<free-registered-key>
