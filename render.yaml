services:
  - type: web
    name: sustainable-catalyst-platform-core
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: ./start.sh
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.11
      - key: SC_CORE_ENVIRONMENT
        value: production
      - key: SC_CORE_PUBLIC_READS
        value: "true"
      - key: SC_CORE_DATABASE_URL
        fromDatabase:
          name: sustainable-catalyst-platform-core-db
          property: connectionString
      - key: SC_CORE_WRITE_API_KEY
        generateValue: true
      - key: SC_CORE_CORS_ORIGINS
        value: https://sustainablecatalyst.com
      - key: SC_CORE_MAX_GRAPH_DEPTH
        value: "4"
      - key: SC_CORE_EXPLORER_ENABLED
        value: "true"
      - key: SC_CORE_EVIDENCE_EXPLORER_ENABLED
        value: "true"
      - key: SC_CORE_SNAPSHOT_EXCERPT_MAX
        value: "1200"
      - key: SC_CORE_PUBLIC_API_ENABLED
        value: "true"
      - key: SC_CORE_DEVELOPER_PORTAL_ENABLED
        value: "true"
      - key: SC_CORE_PUBLIC_API_DEFAULT_PLAN
        value: free
      - key: SC_CORE_API_LOG_SALT
        generateValue: true
      - key: SC_CORE_WEBHOOK_SIGNING_SECRET
        generateValue: true
      - key: SC_CORE_WEBHOOK_DELIVERY_TIMEOUT
        value: "10"

databases:
  - name: sustainable-catalyst-platform-core-db
    databaseName: sustainable_catalyst_platform_core
    user: sustainable_catalyst_platform_core
